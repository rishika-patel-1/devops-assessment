services:
  postgres:
    image: postgres:16
    container_name: hotel-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: hotel_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/01-create-tables.sql:ro
      - ./migrations/002_add_indexes.sql:/docker-entrypoint-initdb.d/02-add-indexes.sql:ro
      - ./seed/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d hotel_booking_db
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hotel-booking-app
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hotel_booking_db
      DB_USER: postgres
      DB_PASSWORD: postgres

    ports:
      - "8082:5000"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: